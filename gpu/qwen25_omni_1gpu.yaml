# Single-GPU (20GB) stage layout for Qwen2.5-Omni-3B.
# Default deploy places talker on device "1" (2x GPU). Force all stages onto cuda:0.
async_chunk: false

stages:
  - stage_id: 0
    max_num_batched_tokens: 4096
    max_num_seqs: 4
    max_model_len: 2048
    gpu_memory_utilization: 0.48
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    mm_processor_cache_gb: 0
    devices: "0"
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: -1
      max_tokens: 256
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    max_num_batched_tokens: 4096
    max_num_seqs: 2
    max_model_len: 2048
    gpu_memory_utilization: 0.22
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    default_sampling_params:
      temperature: 0.9
      top_p: 0.8
      top_k: 40
      max_tokens: 512
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_num_batched_tokens: 4096
    max_num_seqs: 2
    gpu_memory_utilization: 0.12
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    enable_flashinfer_autotune: false
    async_scheduling: false
    devices: "0"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 256
      seed: 42
      repetition_penalty: 1.1
